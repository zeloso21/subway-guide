<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1D4ED8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>지하철 길안내</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Malgun Gothic', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; background: #0A0F1E; }

    /* 헤더 — 네이비 그라디언트 */
    .header { height: 50px; background: linear-gradient(135deg, #0F2460 0%, #1D4ED8 100%); color: white; padding: 0 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; box-shadow: 0 2px 12px rgba(29,78,216,.5); }
    .header h1 { font-size: 16px; font-weight: 800; letter-spacing: -.3px; }
    .loc-badge { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); border-radius: 20px; padding: 3px 10px; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; margin-left: auto; color: #BAE6FD; }

    /* 검색바 */
    .search-bar { height: 52px; background: #111827; padding: 8px 12px; display: flex; gap: 8px; border-bottom: 1px solid #1E293B; flex-shrink: 0; align-items: center; }
    .search-input { flex: 1; padding: 8px 14px; background: #1E293B; border: 1.5px solid #334155; border-radius: 10px; font-size: 14px; outline: none; color: #E2E8F0; }
    .search-input::placeholder { color: #475569; }
    .search-input:focus { border-color: #3B82F6; }
    .search-btn { background: linear-gradient(135deg, #1D4ED8, #2563EB); color: white; border: none; border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; box-shadow: 0 2px 8px rgba(37,99,235,.4); }
    .search-btn:active { opacity: .85; }

    /* 메인 */
    .main { flex: 1; min-height: 0; display: flex; flex-direction: column; }

    /* 지도 — 기본은 전체화면 */
    .map-section { flex: 1; position: relative; border-bottom: 2px solid #1E3A5F; }
    #map { width: 100%; height: 100%; }

    /* 분할 모드 전 — 노선/시간표 숨김 */
    .route-section { display: none; flex: 2; background: #F8FAFF; flex-direction: column; min-height: 0; border-bottom: 1px solid #DBEAFE; }
    .timetable-section { display: none; flex: 1; background: #EFF6FF; flex-direction: column; min-height: 0; }

    /* 분할 모드 진입 시 */
    .main.split .map-section { flex: 1; }
    .main.split .route-section { display: flex; flex: 2; }
    .main.split .timetable-section { display: flex; flex: 1; }

    .section-header { padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #DBEAFE; flex-shrink: 0; background: #EFF6FF; }
    .section-title { font-size: 12px; font-weight: 700; color: #2563EB; letter-spacing: .3px; }
    .toggle-btn { background: none; border: none; font-size: 14px; cursor: pointer; color: #93C5FD; }
    .route-list { overflow-y: auto; flex: 1; }

    /* 역 행 — 지하철 노선도 스타일 */
    .station-row { display: flex; align-items: center; padding: 7px 14px 7px 10px; gap: 0; border-bottom: 1px solid #E2E8F0; cursor: pointer; position: relative; }
    .station-row.current { background: rgba(59,130,246,.1); }
    .station-row.talert { background: rgba(239,68,68,.06); }
    .station-row:active { background: rgba(59,130,246,.05); }

    /* 왼쪽 라인 트랙 */
    .strack { width: 28px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; align-self: stretch; }
    .strack-line { width: 3px; flex: 1; }
    .strack-line.top { border-radius: 0; }
    .strack-line.bot { border-radius: 0; }
    .sdot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #F8FAFF; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
    .sdot.big { width: 14px; height: 14px; }

    .sinfo { flex: 1; padding-left: 8px; }
    .sname { font-size: 13px; font-weight: 600; color: #1E293B; }
    .station-row.current .sname { color: #2563EB; font-weight: 700; }
    .smeta { font-size: 10px; color: #94A3B8; margin-top: 1px; }
    .sbadge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; flex-shrink: 0; font-weight: 600; }
    .sb-transfer { background: #EA580C; }
    .sb-alert { background: #DC2626; animation: blink .8s infinite; }
    .sb-arrive { background: #059669; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
    .route-empty { padding: 24px; text-align: center; color: #94A3B8; font-size: 13px; }

    /* 시간표 하단 */
    .tt-header { padding: 6px 14px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; border-bottom: 1px solid #BFDBFE; background: #DBEAFE; }
    .tt-label { font-size: 10px; font-weight: 700; color: #1D4ED8; letter-spacing: 1px; text-transform: uppercase; }
    .tt-station { font-size: 13px; font-weight: 800; color: #1E40AF; margin-left: 4px; }
    .tt-time { font-size: 13px; font-weight: 700; color: #059669; margin-left: auto; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
    .tt-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 8px 14px; flex: 1; align-items: center; scrollbar-width: none; background: #EFF6FF; }
    .tt-scroll::-webkit-scrollbar { display: none; }
    .tt-card { flex-shrink: 0; background: #fff; border-radius: 8px; padding: 8px 10px; min-width: 84px; text-align: center; border: 1px solid #BFDBFE; box-shadow: 0 1px 4px rgba(59,130,246,.08); }
    .tt-card.next { border-color: #2563EB; background: #DBEAFE; box-shadow: 0 0 10px rgba(37,99,235,.2); }
    .tt-dir { font-size: 9px; color: #94A3B8; margin-bottom: 4px; letter-spacing: .5px; }
    .tt-card.next .tt-dir { color: #2563EB; }
    .tt-depart { font-size: 18px; font-weight: 800; color: #1E293B; font-variant-numeric: tabular-nums; letter-spacing: 1px; font-family: 'Courier New', monospace; }
    .tt-card.next .tt-depart { color: #1E40AF; }
    .tt-remaining { font-size: 10px; color: #94A3B8; margin-top: 3px; }
    .tt-card.next .tt-remaining { color: #059669; }
    .tt-empty { color: #BFDBFE; font-size: 12px; }

    /* Leaflet 역 라벨 */
    .station-label { background: #1D4ED8 !important; color: #fff !important; border: none !important; font-size: 10px !important; font-weight: 700 !important; padding: 2px 6px !important; border-radius: 4px !important; white-space: nowrap !important; }
    .station-label::before { display: none !important; }

    /* 경구 오버레이 */
    .quote-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 24px 28px; background: linear-gradient(to top, rgba(5,10,20,.92) 0%, rgba(5,10,20,.6) 70%, transparent 100%); z-index: 10; pointer-events: none; transition: opacity .6s ease; }
    .quote-overlay.hidden { opacity: 0; }
    .quote-text { font-size: 15px; font-weight: 600; color: #E2E8F0; line-height: 1.65; letter-spacing: -.2px; text-shadow: 0 1px 8px rgba(0,0,0,.8); }
    .quote-author { font-size: 11px; color: #60A5FA; margin-top: 6px; letter-spacing: .5px; }

    /* 언어 선택 */
    .lang-bar { display: flex; gap: 4px; margin-left: 8px; }
    .lang-btn { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.6); border-radius: 6px; padding: 2px 7px; font-size: 10px; font-weight: 700; cursor: pointer; letter-spacing: .3px; }
    .lang-btn.active { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.5); color: #fff; }

    /* 토스트 */
    .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #DC2626; color: white; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 700; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,.6); display: none; text-align: center; max-width: 88vw; }
    .toast.info { background: linear-gradient(135deg,#1D4ED8,#2563EB); }
    .toast.show { display: block; animation: slideDown .25s ease; }
    @keyframes slideDown { from{opacity:0;top:50px}to{opacity:1;top:70px} }
  </style>
</head>

<div class="header">
  <span style="font-size:18px">🚇</span>
  <h1 id="appTitle">지하철 길안내</h1>
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('ko')">KO</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ja')">JA</button>
  </div>
  <div class="loc-badge" id="locBadge">위치 확인 중...</div>
</div>

<div class="search-bar">

</div>

<div class="main">

  <!-- 지도 -->
  <div class="map-section">
    <div id="map"></div>
    <div class="quote-overlay" id="quoteOverlay">

      <div class="quote-author" id="quoteAuthor"></div>
    </div>
  </div>

  <!-- 노선 2/4 -->
  <div class="route-section">
    <div class="section-header">
      <span class="section-title" id="routeTitle">목적지를 입력하세요</span>
      <button class="toggle-btn" id="routeToggleBtn" onclick="toggleRoute()">▼</button>
    </div>
    <div class="route-list" id="routeList">
      <div class="route-empty">경로가 표시됩니다</div>
    </div>
  </div>

  <!-- 시간표 1/4 -->
  <div class="timetable-section">
    <div class="tt-header">
      <span class="tt-title" id="ttTitle">열차 시간표</span>
      <span class="tt-station" id="ttStation">—</span>
      <span class="tt-time" id="ttClock"></span>
    </div>
    <div class="tt-scroll" id="ttScroll">
      <span class="tt-empty">역 선택 시 표시됩니다</span>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

function t(key, ...args) {
  const v = (I18N[LANG_CODE] || I18N.ko)[key];
  return typeof v === 'function' ? v(...args) : (v || key);
}

function setLang(code) {
  LANG_CODE = code;
  localStorage.setItem('lang', code);
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === code.toUpperCase());
  });
  applyLang();
  // 경구 다시 표시
  if (!document.querySelector('.main').classList.contains('split')) showQuote();
}

function applyLang() {
  document.getElementById('appTitle').textContent = t('appTitle');

  document.getElementById('searchBtn').textContent = t('searchBtn');
  document.getElementById('ttTitle').textContent = t('ttTitle');
  // 현재 locBadge가 초기 메시지면 갱신
  const badge = document.getElementById('locBadge');
  const initMsgs = ['위치 확인 중...', 'Locating...', '位置確認中...'];
  if (initMsgs.includes(badge.textContent)) badge.textContent = t('locChecking');
  // 라우트 타이틀이 초기 메시지면 갱신
  const rt = document.getElementById('routeTitle');
  if (rt) {
    const initRts = ['목적지를 입력하세요', 'Enter a destination', '目的地を入力してください'];
    if (initRts.includes(rt.textContent)) rt.textContent = t('routeEmpty');
  }
}

function showQuote() {
  document.getElementById('quoteOverlay').classList.remove('hidden');
  if (LANG_CODE === 'en') {
    // 영어는 API에서 동적 fetch
    const randId = Math.floor(Math.random() * 1450) + 1;
    fetch(`https://dummyjson.com/quotes/${randId}`)
      .then(r => r.json())
      .then(d => {
        document.getElementById('quoteText').textContent = d.quote;
        document.getElementById('quoteAuthor').textContent = '— ' + d.author;
      })
      .catch(() => {
        const q = QUOTES_EN_FALLBACK[Math.floor(Math.random() * QUOTES_EN_FALLBACK.length)];
        document.getElementById('quoteText').textContent = q.text;
        document.getElementById('quoteAuthor').textContent = q.author;
      });
  } else {
    const pool = LANG_CODE === 'ja' ? QUOTES_JA : QUOTES_KO;
    const q = pool[Math.floor(Math.random() * pool.length)];
    document.getElementById('quoteText').textContent = q.text;
    document.getElementById('quoteAuthor').textContent = q.author;
  }
}

function hideQuote() {
  document.getElementById('quoteOverlay').classList.add('hidden');
}

// ODsay lang 파라미터: ko=0, en/ja=1

let S = {

  currentIdx: 0,

// ── 카카오 맵 초기화 ─────────────────────────────────
window.onKakaoLoad = function() {
  try {
    let kakaoReady = false;
    const fallback = setTimeout(function() {
      if (!kakaoReady) startWithLeaflet();
    }, 5000);
    kakao.maps.load(function() {
      kakaoReady = true;
      clearTimeout(fallback);
      S.useKakao = true;
      const el = document.getElementById('map');
      S.map = new kakao.maps.Map(el, {
        center: new kakao.maps.LatLng(37.5665, 126.978),
        level: 4,
      });
      startApp();
    });
  } catch(e) {
    startWithLeaflet();
  }
};

// 카카오 SDK 로드 실패 시 Leaflet 대체
window.onKakaoError = function() { startWithLeaflet(); };

function startWithLeaflet() {
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  script.onload = function() {
    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(css);
    setTimeout(function() {
      S.map = L.map('map').setView([37.5665, 126.978], 13);
      const tileUrl = LANG_CODE === 'ko'
        ? 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
        : 'https://{s}.basemaps.cartocdn.com/dark_matter_all/{z}/{x}/{y}{r}.png';
      S.leafletTile = L.tileLayer(tileUrl).addTo(S.map);
      startApp();
    }, 200);
  };
  document.head.appendChild(script);
}

function startApp() {
  applyLang();
  // 저장된 언어로 버튼 상태 복원
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === LANG_CODE.toUpperCase());
  });
  showQuote();
  requestLocation();
  requestNotifPerm();
  startClock();
}

// ── 위치 ────────────────────────────────────────────
function requestLocation() {
  if (!navigator.geolocation) { setLocBadge(t('locFail')); return; }
  navigator.geolocation.getCurrentPosition(onLocOK, onLocFail, { enableHighAccuracy: true, timeout: 12000 });
  navigator.geolocation.watchPosition(onLocUpdate, null, { enableHighAccuracy: true, maximumAge: 15000 });
}

function onLocOK(p) {
  S.pos = { lat: p.coords.latitude, lng: p.coords.longitude };
  mapSetCenter(S.pos.lat, S.pos.lng, S.useKakao ? 5 : 13);
  setCurrentMarker();
  findNearestStation();
}

function onLocUpdate(p) {
  S.pos = { lat: p.coords.latitude, lng: p.coords.longitude };
  setCurrentMarker();
  if (S.flatStations.length) checkTransferAlert();
}

function onLocFail() { setLocBadge(t('locFail')); }

function setCurrentMarker() {
  if (!S.pos) return;
  if (S.useKakao) {
    if (S._curMarker) S._curMarker.setMap(null);
    S._curMarker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(S.pos.lat, S.pos.lng),
      map: S.map,
    });
  } else {
    if (S._curMarker) S.map.removeLayer(S._curMarker);
    S._curMarker = L.circleMarker([S.pos.lat, S.pos.lng], {
      radius: 8, color: '#1D4ED8', fillColor: '#3B82F6', fillOpacity: 0.9, weight: 2,
    }).addTo(S.map);
  }
}

// ── 가까운 역 ───────────────────────────────────────
function findNearestStation() {
  const { lat, lng } = S.pos;
  fetch(`https://api.odsay.com/v1/api/searchStationByPosition?lang=${odsayLang()}&x=${lng}&y=${lat}&stationClass=1&apiKey=${encodeURIComponent(ODSAY_KEY)}`)
    .then(r => r.json())
    .then(d => {
      const stations = d.result?.station || [];
      // 2km 이내 역 필터
      const nearby = stations.filter(st => calcDist(lat, lng, st.y, st.x) <= 2);
      if (!nearby.length) { setLocBadge(t('locNoStation')); return; }
      const st = nearby[0];
      S.nearestStation = st;
      const dist = calcDist(lat, lng, st.y, st.x);
      const walkMin = Math.max(1, Math.ceil(dist / 0.07));
      setLocBadge(t('locNear', st.stationName, walkMin));
      // 역 마커 표시
      addStationMarker(st.y, st.x, st.stationName);
      showTimetable(st.stationName, '');
    })
    .catch(() => setLocBadge(t('locError')));
}

// ── 경로 검색 ───────────────────────────────────────
async function searchRoute() {
  const raw = document.getElementById('destInput').value.trim();
  if (!raw) { showToast(t('inputHint'), false, 2000); return; }
  const destName = raw.endsWith('역') ? raw.slice(0, -1) : raw;
  if (!S.pos) { showToast(t('locating'), false, 2000); return; }

  showToast(t('searching'), true, 99999);
  try {
    const dest = await findStation(destName);
    if (!dest) { showToast(t('notFound'), false, 3000); return; }

    const { lat, lng } = S.pos;
    const d = await fetch(`https://api.odsay.com/v1/api/searchPubTransPathT?SX=${lng}&SY=${lat}&EX=${dest.x}&EY=${dest.y}&OPT=0&lang=${odsayLang()}&apiKey=${encodeURIComponent(ODSAY_KEY)}`).then(r => r.json());
    hideToast();
    if (!d.result?.path?.length) { showToast(t('noRoute'), false, 3000); return; }
    buildRoute(d.result.path[0], destName);
  } catch(e) {
    hideToast();
    showToast(t('searchFail', e.message), false, 3000);
  }
}

async function findStation(name) {
  const d = await fetch(`https://api.odsay.com/v1/api/searchStation?lang=${odsayLang()}&stationName=${encodeURIComponent(name)}&apiKey=${encodeURIComponent(ODSAY_KEY)}`).then(r => r.json());
  return d.result?.station?.[0] || null;
}

// ── 경로 구성 ───────────────────────────────────────
function buildRoute(path, destName) {
  S.flatStations = [];
  S.subPaths = [];
  S.currentIdx = 0;
  S.alertedSet = new Set();
  clearMapLayers();

  const subwaySegs = path.subPath.filter(sp => sp.trafficType === 1);
  const totalSubs = subwaySegs.length;

  subwaySegs.forEach((sp, subIdx) => {
    const stations = sp.passStopList?.stations || [];
    const color = lineColor(sp.lane?.[0]?.subwayCode);
    const lineName = sp.lane?.[0]?.laneName || '';
    const direction = sp.direction || '';          // ODsay가 주는 방면 (예: "강남방면")
    const hasNext = subIdx < totalSubs - 1;

    stations.forEach((st, si) => {
      // 두 번째 이상 구간의 첫 역 = 환승역 중복 → 건너뜀
      if (si === 0 && subIdx > 0) return;

      const isLast = si === stations.length - 1;
      S.flatStations.push({
        name: st.stationName,
        x: parseFloat(st.x), y: parseFloat(st.y),
        color, lineName,
        direction,
        isTransfer: isLast && hasNext,
        isFinal: !hasNext && isLast,
      });
    });
    S.subPaths.push({ stations, color });
  });

  if (!S.flatStations.length) { showToast(t('noSubway'), false, 3000); return; }

  // 도착 배지: destName과 일치하는 역 우선, 없으면 마지막 역 유지
  const clean = s => s.replace(/역$/, '');
  const destIdx = S.flatStations.findIndex(st => clean(st.name) === clean(destName));
  if (destIdx !== -1) {
    S.flatStations.forEach((st, i) => {
      st.isFinal = i === destIdx;
      if (i === destIdx) st.isTransfer = false;
    });
  }

  const info = path.info;
  const subwayTransfers = subwaySegs.length - 1;
  document.getElementById('routeTitle').textContent = t('routeTitle', destName, info.totalTime, subwayTransfers);

  enableSplitMode();
  renderRouteList();
  drawRouteOnMap();
  showTimetable(S.flatStations[0].name, destName + '방면');
}

function enableSplitMode() {
  document.querySelector('.main').classList.add('split');
  hideQuote();
}

// ── 경로 목록 렌더링 ────────────────────────────────
function getAlertIdxs() {
  const r = [];
  S.flatStations.forEach((st, i) => {
    if (st.isTransfer || st.isFinal) {
      if (i >= 2) r.push(i-2);
      if (i >= 1) r.push(i-1);
      r.push(i);
    }
  });
  return [...new Set(r)];
}

function renderRouteList() {
  const alertIdxs = getAlertIdxs();
  const list = document.getElementById('routeList');
  list.innerHTML = '';
  S.flatStations.forEach((st, i) => {
    const isAlert = alertIdxs.includes(i) && i >= S.currentIdx;
    const div = document.createElement('div');
    div.className = 'station-row' + (i === S.currentIdx ? ' current' : '') + (isAlert ? ' talert' : '');
    let badge = '';
    if (st.isFinal) badge = `<span class="sbadge sb-arrive">${t('badgeArrive')}</span>`;
    else if (st.isTransfer) badge = `<span class="sbadge sb-transfer">${t('badgeTransfer')}</span>`;
    else if (isAlert) {
      const nextSp = S.flatStations.findIndex((s, j) => j > i && (s.isTransfer || s.isFinal));
      const isFinalAlert = nextSp !== -1 && S.flatStations[nextSp].isFinal;
      badge = `<span class="sbadge sb-alert">${t(isFinalAlert ? 'badgeAlertFinal' : 'badgeAlert')}</span>`;
    }
    const isFirst = i === 0, isLast = st.isFinal;
    div.innerHTML = `
      <div class="strack">
        <div class="strack-line top" style="background:${isFirst?'transparent':st.color}"></div>
        <div class="sdot${(st.isTransfer||st.isFinal||i===S.currentIdx)?' big':''}" style="background:${st.color};color:${st.color}"></div>
        <div class="strack-line bot" style="background:${isLast?'transparent':st.color}"></div>
      </div>
      <div class="sinfo">
        <div class="sname">${i === S.currentIdx ? '▶ ' : ''}${st.name}</div>
        <div class="smeta">${st.lineName}</div>
      </div>${badge}`;
    div.onclick = () => jumpToStation(i);
    list.appendChild(div);
  });
  list.querySelectorAll('.station-row')[S.currentIdx]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── 지도 경로 그리기 ────────────────────────────────
function drawRouteOnMap() {
  if (S.useKakao) {
    S.subPaths.forEach(sp => {
      if (sp.stations.length < 2) return;
      const path = sp.stations.map(s => new kakao.maps.LatLng(parseFloat(s.y), parseFloat(s.x)));
      const poly = new kakao.maps.Polyline({ path, strokeWeight: 5, strokeColor: sp.color, strokeOpacity: 0.9, map: S.map });
      S.mapLayers.push(poly);
    });
    S.flatStations.forEach((st, i) => {
      if (i === 0 || st.isTransfer || st.isFinal) {
        const ov = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(st.y, st.x),
          content: `<div style="background:${st.color};color:#fff;padding:2px 6px;border-radius:5px;font-size:10px;font-weight:700">${st.name}</div>`,
          yAnchor: 1.5, map: S.map,
        });
        S.mapLayers.push(ov);
      }
    });
    const bounds = new kakao.maps.LatLngBounds();
    S.flatStations.forEach(st => bounds.extend(new kakao.maps.LatLng(st.y, st.x)));
    if (S.pos) bounds.extend(new kakao.maps.LatLng(S.pos.lat, S.pos.lng));
    S.map.setBounds(bounds);
  } else {
    S.subPaths.forEach(sp => {
      const pts = sp.stations.map(s => [parseFloat(s.y), parseFloat(s.x)]);
      const poly = L.polyline(pts, { color: sp.color, weight: 5, opacity: 0.85 }).addTo(S.map);
      S.mapLayers.push(poly);
    });
    const bounds = S.flatStations.map(st => [st.y, st.x]);
    if (S.pos) bounds.push([S.pos.lat, S.pos.lng]);
    if (bounds.length) S.map.fitBounds(bounds, { padding: [10, 10] });
  }
}

function clearMapLayers() {
  if (S.useKakao) S.mapLayers.forEach(l => l.setMap(null));
  else S.mapLayers.forEach(l => S.map.removeLayer(l));
  S.mapLayers = [];
}

function addStationMarker(lat, lng, name) {
  if (!S.map) return;
  if (S.useKakao) {
    const ov = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(lat, lng),
      content: `<div style="background:#1D4ED8;color:#fff;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap">🚇 ${name}</div>`,
      yAnchor: 1.5, map: S.map,
    });
    S.mapLayers.push(ov);
  } else {
    const marker = L.circleMarker([lat, lng], {
      radius: 7, color: '#1D4ED8', fillColor: '#3B82F6', fillOpacity: 1, weight: 2,
    }).bindTooltip(name, { permanent: true, direction: 'top', className: 'station-label' }).addTo(S.map);
    S.mapLayers.push(marker);
  }
}

// ── 역 이동 ──────────────────────────────────────────
function jumpToStation(idx) {
  S.currentIdx = idx;
  renderRouteList();
  const st = S.flatStations[idx];
  mapSetCenter(st.y, st.x, S.useKakao ? 4 : 15);
  showTimetable(st.name, st.direction || '');
}

function mapSetCenter(lat, lng, level) {
  if (!S.map) return;
  if (S.useKakao) {
    S.map.setCenter(new kakao.maps.LatLng(lat, lng));
    S.map.setLevel(level);
  } else {
    S.map.setView([lat, lng], level);
  }
}

// ── 환승 알림 ────────────────────────────────────────
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = LANG_CODE === 'ja' ? 'ja-JP' : LANG_CODE === 'en' ? 'en-US' : 'ko-KR';
  utter.rate = 0.92;
  utter.volume = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function checkTransferAlert() {
  if (!S.pos || !S.flatStations.length) return;
  let closestIdx = S.currentIdx, minDist = Infinity;
  S.flatStations.forEach((st, i) => {
    const d = calcDist(S.pos.lat, S.pos.lng, st.y, st.x);
    if (d < minDist) { minDist = d; closestIdx = i; }
  });
  if (minDist < 0.6 && closestIdx !== S.currentIdx) {
    S.currentIdx = closestIdx;
    renderRouteList();
    const st = S.flatStations[closestIdx];
    showTimetable(st.name, st.direction || '');
  }

  if (S.alertedSet.has(S.currentIdx)) return;
  const cur = S.flatStations[S.currentIdx];

  // 환승 당역
  if (cur.isTransfer) {
    S.alertedSet.add(S.currentIdx);
    const msg = `${cur.name}역입니다. 환승하세요.`;
    speak(msg);
    triggerAlert(`🔄 ${msg}`);
    return;
  }

  // 하차 당역
  if (cur.isFinal) {
    S.alertedSet.add(S.currentIdx);
    const msg = `${cur.name}역입니다. 내리세요.`;
    speak(msg);
    triggerAlert(`🚉 ${msg}`);
    return;
  }

  // 환승/하차 N정거장 전
  const nextIdx = S.flatStations.findIndex((st, i) => i > S.currentIdx && (st.isTransfer || st.isFinal));
  if (nextIdx === -1) return;
  const left = nextIdx - S.currentIdx;
  if (left !== 1 && left !== 2) return;

  S.alertedSet.add(S.currentIdx);
  const target = S.flatStations[nextIdx];
  const type = target.isTransfer ? '환승' : '하차';
  const msg = left === 1
    ? `다음 역 [${target.name}] ${type}역입니다.`
    : `2정거장 후 [${target.name}] ${type}역입니다.`;
  speak(msg);
  triggerAlert(`⚠️ ${msg}`);
}

function triggerAlert(msg) {
  showToast(msg, false, 6000);
  if ('vibrate' in navigator) navigator.vibrate([400, 150, 400]);
  if (Notification.permission === 'granted') new Notification(t('alertTitle'), { body: msg });
}

function requestNotifPerm() {
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}

// ── 시간표 ───────────────────────────────────────────
const SEOUL_RT_KEY = '6457544f497a656c38355746706d63';
let S_rtCache = null;
let S_rtLastFetch = 0;

// 실시간 실패 시 폴백용 배차 간격(분): [러시아워, 일반, 심야]
const LINE_INTERVAL = {
  1: [4, 7, 12], 2: [2, 4, 8], 3: [4, 6, 12], 4: [4, 6, 12],
  5: [5, 7, 12], 6: [5, 7, 15], 7: [5, 7, 15], 8: [5, 8, 20], 9: [5, 8, 20],
};
const RUSH = [[7*60,9*60],[18*60,20*60]];

function getInterval(lineNum) {
  const now = new Date();
  const mins = now.getHours()*60 + now.getMinutes();
  const isRush = RUSH.some(([s, e]) => mins >= s && mins <= e);
  const isLate = now.getHours() >= 23 || now.getHours() < 6;
  const ivs = LINE_INTERVAL[lineNum] || [5, 8, 15];
  return isLate ? ivs[2] : isRush ? ivs[0] : ivs[1];
}

async function fetchRealtimeArrival(stationName) {
  try {
    const url = `https://swopenAPI.seoul.go.kr/api/subway/${SEOUL_RT_KEY}/json/realtimeStationArrival/0/30/${encodeURIComponent(stationName)}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.realtimeArrivalList && data.realtimeArrivalList.length > 0) return data.realtimeArrivalList;
    return null;
  } catch(e) { return null; }
}

async function refreshRealtimeTimetable(stationName, lineNum) {
  const now = Date.now();
  if (now - S_rtLastFetch > 30000) {
    S_rtLastFetch = now;
    S_rtCache = await fetchRealtimeArrival(stationName);
  }
  renderTimetable(lineNum, S.ttDirection, S_rtCache);
}

function showTimetable(stationName, direction) {
  S.ttStation = stationName;
  S.ttDirection = direction || '';
  const suffix = LANG_CODE === 'ko' ? '역' : LANG_CODE === 'ja' ? '駅' : '';
  document.getElementById('ttStation').textContent = stationName + suffix;

  let lineNum = 2;
  if (S.flatStations.length) {
    const st = S.flatStations.find(s => s.name === stationName);
    if (st) {
      const match = st.lineName.match(/(\d+)/);
      if (match) lineNum = parseInt(match[1]);
    }
  }

  S_rtCache = null;
  S_rtLastFetch = 0;
  refreshRealtimeTimetable(stationName, lineNum);
}

function renderTimetable(lineNum, direction, rtList) {
  const scroll = document.getElementById('ttScroll');

  if (rtList && rtList.length > 0) {
    scroll.innerHTML = rtList.slice(0, 6).map((item, i) => {
      const secs = parseInt(item.barvlDt) || 0;
      const mins = Math.floor(secs / 60);
      const msg = item.arvlMsg2 || (mins < 1 ? t('soon') : t('minsLater', mins));
      const dest = item.arvlMsg3 || '';
      const lineName = item.subwayNm || '';
      const updn = item.updnLine || '';
      return `
        <div class="tt-card${i === 0 ? ' next' : ''}">
          <div class="tt-dir">${lineName} ${updn}</div>
          <div class="tt-depart" style="font-size:13px;letter-spacing:0;line-height:1.3">${dest}</div>
          <div class="tt-remaining">${msg}</div>
        </div>`;
    }).join('');
  } else {
    // 폴백: 배차 간격 기반 추정
    const interval = getInterval(lineNum);
    const now = new Date();
    const elapsed = (now.getHours()*60 + now.getMinutes()) % interval + now.getSeconds()/60;
    const nextMins = interval - (elapsed % interval);
    const dirLabel = direction || t('dirDefault');
    scroll.innerHTML = Array.from({length: 6}, (_, i) => {
      const offset = nextMins + i * interval;
      const depTime = new Date(now.getTime() + offset * 60000);
      const time = depTime.getHours().toString().padStart(2,'0') + ':' + depTime.getMinutes().toString().padStart(2,'0');
      const remaining = Math.round(offset);
      return `
        <div class="tt-card${i === 0 ? ' next' : ''}">
          <div class="tt-dir">${dirLabel}</div>
          <div class="tt-depart">${time}</div>
          <div class="tt-remaining">${remaining < 1 ? t('soon') : t('minsLater', remaining)}</div>
        </div>`;
    }).join('');
  }
}

// 시계 업데이트
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('ttClock').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0') + ':' +
      now.getSeconds().toString().padStart(2,'0');
    if (S.ttStation) {
      const lineNum = getCurrentLineNum();
      if (Date.now() - S_rtLastFetch > 30000) {
        refreshRealtimeTimetable(S.ttStation, lineNum);
      } else {
        renderTimetable(lineNum, S.ttDirection || '', S_rtCache);
      }
    }
  }
  tick();
  setInterval(tick, 1000);
}

function getCurrentLineNum() {
  if (S.flatStations.length && S.flatStations[S.currentIdx]) {
    const m = S.flatStations[S.currentIdx].lineName.match(/(\d+)/);
    if (m) return parseInt(m[1]);
  }
  return 2;
}

// ── 유틸 ─────────────────────────────────────────────
function calcDist(lat1, lng1, lat2, lng2) {
  const R=6371, d2r=Math.PI/180;
  const dLat=(lat2-lat1)*d2r, dLng=(lng2-lng1)*d2r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function lineColor(code) {
  return ({1:'#0052A4',2:'#009246',3:'#EF7C1C',4:'#00A5DE',5:'#996CAC',
           6:'#CD7C2F',7:'#747F00',8:'#E6186C',9:'#BDB092'})[code]||'#4B5563';
}

function setLocBadge(msg) { document.getElementById('locBadge').textContent = msg; }

let _tt;
function showToast(msg, info=false, ms=3000) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast'+(info?' info':'')+' show';
  clearTimeout(_tt); if(ms<90000) _tt=setTimeout(()=>el.classList.remove('show'),ms);
}
function hideToast(){document.getElementById('toast').classList.remove('show');clearTimeout(_tt);}

let routeOpen=true;
function toggleRoute(){
  routeOpen=!routeOpen;
  document.getElementById('routeList').style.display=routeOpen?'':'none';
  document.getElementById('routeToggleBtn').textContent=routeOpen?'▼':'▲';
}
