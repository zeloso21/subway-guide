<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1D4ED8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>지하철 길안내</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #F8FAFC; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    .header { background: #1D4ED8; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header h1 { font-size: 17px; font-weight: 700; }
    .location-badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 10px; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; margin-left: auto; }

    .dest-bar { background: white; padding: 10px 16px; display: flex; gap: 8px; border-bottom: 1px solid #E2E8F0; flex-shrink: 0; }
    .dest-input { flex: 1; padding: 10px 14px; border: 2px solid #CBD5E1; border-radius: 10px; font-size: 15px; outline: none; }
    .dest-input:focus { border-color: #1D4ED8; }
    .dest-btn { background: #1D4ED8; color: white; border: none; border-radius: 10px; padding: 10px 18px; font-size: 15px; font-weight: 600; cursor: pointer; }

    #map { flex: 1; min-height: 0; z-index: 0; }

    .route-panel { background: white; border-top: 3px solid #1D4ED8; display: none; flex-direction: column; max-height: 42vh; flex-shrink: 0; }
    .route-header { padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #F1F5F9; flex-shrink: 0; }
    .route-header h2 { font-size: 14px; font-weight: 700; color: #1E293B; }
    .route-toggle { background: none; border: none; font-size: 18px; cursor: pointer; color: #64748B; padding: 0 4px; }
    .route-list { overflow-y: auto; flex: 1; }
    .station-item { display: flex; align-items: center; padding: 9px 16px; gap: 10px; border-bottom: 1px solid #F8FAFC; cursor: pointer; }
    .station-item.current { background: #EFF6FF; }
    .station-item.transfer-alert { background: #FEF2F2; }
    .station-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .station-info { flex: 1; }
    .station-name { font-size: 13px; font-weight: 600; color: #1E293B; }
    .station-meta { font-size: 11px; color: #94A3B8; margin-top: 1px; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; flex-shrink: 0; }
    .badge-transfer { background: #F97316; }
    .badge-alert { background: #EF4444; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .spots-panel { background: white; border-top: 1px solid #E2E8F0; flex-shrink: 0; height: 130px; }
    .spots-tabs { display: flex; align-items: center; padding: 8px 16px 6px; gap: 8px; }
    .tab-btn { background: none; border: 1px solid #CBD5E1; border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; color: #64748B; }
    .tab-btn.active { background: #1D4ED8; border-color: #1D4ED8; color: white; font-weight: 600; }
    .spots-label { font-size: 11px; color: #94A3B8; margin-left: auto; }
    .spots-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 16px 10px; scrollbar-width: none; }
    .spots-scroll::-webkit-scrollbar { display: none; }
    .spot-card { flex-shrink: 0; background: #F8FAFC; border-radius: 10px; padding: 9px 11px; width: 150px; border: 1px solid #E2E8F0; cursor: pointer; }
    .spot-name { font-size: 13px; font-weight: 600; color: #1E293B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .spot-cat { font-size: 10px; color: #94A3B8; margin-top: 2px; }
    .spot-dist { font-size: 11px; color: #3B82F6; margin-top: 3px; }
    .spots-empty { width: 100%; text-align: center; font-size: 13px; color: #94A3B8; padding: 10px 0; }

    .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #EF4444; color: white; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 700; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,.3); display: none; text-align: center; max-width: 88vw; }
    .toast.info { background: #1D4ED8; }
    .toast.show { display: block; animation: fadeDown .3s ease; }
    @keyframes fadeDown { from{opacity:0;top:60px} to{opacity:1;top:80px} }
  </style>
</head>
<body>

<div class="header">
  <span>🚇</span>
  <h1>지하철 길안내</h1>
  <div class="location-badge" id="locationBadge">위치 확인 중...</div>
</div>

<div class="dest-bar">
  <input class="dest-input" id="destInput" type="text" placeholder="목적지 역 이름 (예: 강남)" />
  <button class="dest-btn" onclick="searchRoute()">안내</button>
</div>

<div id="map"></div>

<div class="route-panel" id="routePanel">
  <div class="route-header">
    <h2 id="routeTitle">경로</h2>
    <button class="route-toggle" id="routeToggleBtn" onclick="toggleRoute()">▼</button>
  </div>
  <div class="route-list" id="routeList"></div>
</div>

<div class="spots-panel">
  <div class="spots-tabs">
    <button class="tab-btn active" id="tab-food" onclick="switchTab('food')">🍽 맛집</button>
    <button class="tab-btn" id="tab-scenic" onclick="switchTab('scenic')">🌸 경치</button>
    <span class="spots-label" id="spotsLabel"></span>
  </div>
  <div class="spots-scroll" id="spotsScroll">
    <div class="spots-empty">역 선택 시 주변 장소가 표시됩니다</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const ODSAY_KEY = 'OLKXZpgL39Z/FRXbnoLDyQ';

let S = {
  pos: null,
  nearestStation: null,
  flatStations: [],
  subPaths: [],
  currentIdx: 0,
  alertedSet: new Set(),
  map: null,
  layers: [],
  spotsTab: 'food',
  spotsPos: null,
};

// ── 초기화 ──────────────────────────────────────────
window.addEventListener('load', () => {
  initMap();
  requestLocation();
  requestNotifPerm();
});

function initMap() {
  S.map = L.map('map', { zoomControl: true }).setView([37.5665, 126.9780], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19,
  }).addTo(S.map);
}

// ── 위치 ────────────────────────────────────────────
function requestLocation() {
  if (!navigator.geolocation) { setLocBadge('위치 서비스 미지원'); return; }
  navigator.geolocation.getCurrentPosition(onLocOK, onLocFail, { enableHighAccuracy: true, timeout: 12000 });
  navigator.geolocation.watchPosition(onLocUpdate, null, { enableHighAccuracy: true, maximumAge: 15000 });
}

function onLocOK(p) {
  S.pos = { lat: p.coords.latitude, lng: p.coords.longitude };
  S.map.setView([S.pos.lat, S.pos.lng], 15);
  setCurrentMarker();
  findNearestStation();
}

function onLocUpdate(p) {
  S.pos = { lat: p.coords.latitude, lng: p.coords.longitude };
  setCurrentMarker();
  if (S.flatStations.length) checkTransferAlert();
}

function onLocFail() { setLocBadge('위치 권한이 필요합니다'); }

function setCurrentMarker() {
  if (S._curMarker) S.map.removeLayer(S._curMarker);
  S._curMarker = L.circleMarker([S.pos.lat, S.pos.lng], {
    radius: 8, color: '#1D4ED8', fillColor: '#3B82F6', fillOpacity: 0.9, weight: 2,
  }).addTo(S.map).bindPopup('현재 위치');
}

// ── 가까운 역 ───────────────────────────────────────
function findNearestStation() {
  const { lat, lng } = S.pos;
  fetch(`https://api.odsay.com/v1/api/searchStationByPositionAsMapLine?lang=0&x=${lng}&y=${lat}&apiKey=${encodeURIComponent(ODSAY_KEY)}`)
    .then(r => r.json())
    .then(d => {
      const st = d.result?.station?.[0];
      if (!st) { setLocBadge('주변 역 없음'); return; }
      S.nearestStation = st;
      const dist = calcDist(lat, lng, st.y, st.x);
      const walkMin = Math.max(1, Math.ceil(dist / 0.07));
      setLocBadge(`🚇 ${st.stationName}역 (도보 ${walkMin}분)`);
      addStationMarker(st.y, st.x, st.stationName, '#7C3AED');
      loadSpotsAt({ lat: st.y, lng: st.x }, st.stationName + '역');
    })
    .catch(() => setLocBadge('위치 확인 실패'));
}

// ── 경로 검색 ───────────────────────────────────────
async function searchRoute() {
  const destName = document.getElementById('destInput').value.trim();
  if (!destName) { showToast('목적지를 입력하세요', false, 2000); return; }
  if (!S.pos) { showToast('위치 확인 중입니다', false, 2000); return; }

  showToast('경로 검색 중...', true, 99999);
  try {
    const dest = await findStation(destName);
    if (!dest) { showToast('역을 찾을 수 없습니다', false, 3000); return; }

    const { lat, lng } = S.pos;
    const d = await fetch(`https://api.odsay.com/v1/api/searchPubTransPathT?SX=${lng}&SY=${lat}&EX=${dest.x}&EY=${dest.y}&OPT=0&apiKey=${encodeURIComponent(ODSAY_KEY)}`).then(r => r.json());
    hideToast();

    if (!d.result?.path?.length) { showToast('경로 없음', false, 3000); return; }
    buildRoute(d.result.path[0], destName);
  } catch(e) {
    hideToast();
    showToast('검색 실패: ' + e.message, false, 3000);
  }
}

async function findStation(name) {
  const d = await fetch(`https://api.odsay.com/v1/api/searchStation?lang=0&stationName=${encodeURIComponent(name)}&apiKey=${encodeURIComponent(ODSAY_KEY)}`).then(r => r.json());
  return d.result?.station?.[0] || null;
}

// ── 경로 구성 ───────────────────────────────────────
function buildRoute(path, destName) {
  S.flatStations = [];
  S.subPaths = [];
  S.currentIdx = 0;
  S.alertedSet = new Set();
  clearMapLayers();

  path.subPath.forEach((sp, spIdx) => {
    if (sp.trafficType !== 1) return;
    const stations = sp.passStopList?.stations || [];
    const color = lineColor(sp.lane?.[0]?.subwayCode);
    const lineName = sp.lane?.[0]?.laneName || '';
    const hasNextSubway = path.subPath.slice(spIdx + 1).some(nx => nx.trafficType === 1);

    stations.forEach((st, si) => {
      const isLast = si === stations.length - 1;
      S.flatStations.push({
        name: st.stationName,
        x: parseFloat(st.x), y: parseFloat(st.y),
        color, lineName,
        isTransfer: isLast && hasNextSubway,
        isFinal: spIdx === path.subPath.filter(x=>x.trafficType===1).length-1 && isLast,
      });
    });
    S.subPaths.push({ stations, color });
  });

  if (!S.flatStations.length) { showToast('지하철 경로 없음', false, 3000); return; }

  const info = path.info;
  document.getElementById('routeTitle').textContent = `→ ${destName}역  ${info.totalTime}분 · 환승 ${info.transferCount}회`;

  renderRouteList();
  drawRouteOnMap();

  const panel = document.getElementById('routePanel');
  panel.style.display = 'flex';
  panel.style.flexDirection = 'column';

  updateSpotsForNext();
}

// ── 경로 목록 ────────────────────────────────────────
function getAlertIndices() {
  const r = [];
  S.flatStations.forEach((st, i) => {
    if (st.isTransfer) {
      if (i >= 2) r.push(i - 2);
      if (i >= 1) r.push(i - 1);
    }
  });
  return r;
}

function renderRouteList() {
  const alertIdxs = getAlertIndices();
  const list = document.getElementById('routeList');
  list.innerHTML = '';
  S.flatStations.forEach((st, i) => {
    const isAlert = alertIdxs.includes(i);
    const div = document.createElement('div');
    div.className = 'station-item' +
      (i === S.currentIdx ? ' current' : '') +
      (isAlert && i >= S.currentIdx ? ' transfer-alert' : '');

    let badge = '';
    if (st.isTransfer) badge = '<span class="badge badge-transfer">환승</span>';
    else if (st.isFinal) badge = '<span class="badge" style="background:#10B981">도착</span>';
    else if (isAlert && i >= S.currentIdx) badge = '<span class="badge badge-alert">⚠ 환승준비</span>';

    div.innerHTML = `
      <div class="station-dot" style="background:${st.color}"></div>
      <div class="station-info">
        <div class="station-name">${i === S.currentIdx ? '▶ ' : ''}${st.name}</div>
        <div class="station-meta">${st.lineName}</div>
      </div>${badge}`;
    div.onclick = () => jumpToStation(i);
    list.appendChild(div);
  });
  list.querySelectorAll('.station-item')[S.currentIdx]?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── 지도 그리기 (Leaflet) ────────────────────────────
function drawRouteOnMap() {
  S.subPaths.forEach(sp => {
    if (sp.stations.length < 2) return;
    const pts = sp.stations.map(st => [parseFloat(st.y), parseFloat(st.x)]);
    const poly = L.polyline(pts, { color: sp.color, weight: 5, opacity: 0.85 }).addTo(S.map);
    S.layers.push(poly);
  });

  S.flatStations.forEach((st, i) => {
    if (i === 0 || st.isTransfer || st.isFinal) {
      addStationMarker(st.y, st.x, st.name, st.color);
    }
  });

  const bounds = S.flatStations.map(st => [st.y, st.x]);
  if (S.pos) bounds.push([S.pos.lat, S.pos.lng]);
  if (bounds.length) S.map.fitBounds(bounds, { padding: [20, 20] });
}

function addStationMarker(lat, lng, name, color) {
  const icon = L.divIcon({
    html: `<div style="background:${color};color:white;padding:2px 6px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap">${name}</div>`,
    className: '',
    iconAnchor: [0, 20],
  });
  const m = L.marker([lat, lng], { icon }).addTo(S.map);
  S.layers.push(m);
}

function clearMapLayers() {
  S.layers.forEach(l => S.map.removeLayer(l));
  S.layers = [];
}

// ── 역 이동 ──────────────────────────────────────────
function jumpToStation(idx) {
  S.currentIdx = idx;
  renderRouteList();
  const st = S.flatStations[idx];
  S.map.setView([st.y, st.x], 15);
  updateSpotsForNext();
}

// ── 환승 알림 ────────────────────────────────────────
function checkTransferAlert() {
  if (!S.pos || !S.flatStations.length) return;
  let closestIdx = S.currentIdx, minDist = Infinity;
  S.flatStations.forEach((st, i) => {
    const d = calcDist(S.pos.lat, S.pos.lng, st.y, st.x);
    if (d < minDist) { minDist = d; closestIdx = i; }
  });
  if (minDist < 0.6 && closestIdx !== S.currentIdx) {
    S.currentIdx = closestIdx;
    renderRouteList();
    updateSpotsForNext();
  }
  const alertIdxs = getAlertIndices();
  if (alertIdxs.includes(S.currentIdx) && !S.alertedSet.has(S.currentIdx)) {
    S.alertedSet.add(S.currentIdx);
    const transferSt = S.flatStations.find((st, i) => st.isTransfer && i > S.currentIdx);
    if (transferSt) {
      const left = S.flatStations.indexOf(transferSt) - S.currentIdx;
      triggerAlert(`⚠️ ${left}정거장 후 [${transferSt.name}]역 환승!`);
    }
  }
}

function triggerAlert(msg) {
  showToast(msg, false, 6000);
  if ('vibrate' in navigator) navigator.vibrate([400, 150, 400]);
  if (Notification.permission === 'granted') new Notification('환승 알림', { body: msg });
}

function requestNotifPerm() {
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}

// ── 주변 장소 (Overpass API) ──────────────────────────
function updateSpotsForNext() {
  const nextIdx = Math.min(S.currentIdx + 1, S.flatStations.length - 1);
  const st = S.flatStations[nextIdx];
  if (st) loadSpotsAt({ lat: st.y, lng: st.x }, st.name + '역');
}

function loadSpotsAt(pos, label) {
  S.spotsPos = pos;
  document.getElementById('spotsLabel').textContent = label + ' 근처';
  fetchSpots(pos, S.spotsTab);
}

function switchTab(tab) {
  S.spotsTab = tab;
  document.getElementById('tab-food').className = 'tab-btn' + (tab === 'food' ? ' active' : '');
  document.getElementById('tab-scenic').className = 'tab-btn' + (tab === 'scenic' ? ' active' : '');
  if (S.spotsPos) fetchSpots(S.spotsPos, tab);
}

function fetchSpots(pos, tab) {
  const { lat, lng } = pos;
  const r = 500;
  let filter;
  if (tab === 'food') {
    filter = 'node["amenity"~"restaurant|cafe|food_court"](around:' + r + ',' + lat + ',' + lng + ');way["amenity"~"restaurant|cafe"](around:' + r + ',' + lat + ',' + lng + ');';
  } else {
    filter = 'node["leisure"~"park|garden|viewpoint"](around:' + r + ',' + lat + ',' + lng + ');node["natural"~"peak|beach|wood"](around:' + r + ',' + lat + ',' + lng + ');';
  }
  const query = '[out:json][timeout:10];(' + filter + ');out body 10;';
  fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    body: 'data=' + encodeURIComponent(query),
  })
    .then(r => r.json())
    .then(d => {
      const items = (d.elements || []).filter(e => e.tags?.name).slice(0, 8);
      renderSpots(items, pos);
    })
    .catch(() => renderSpots([], pos));
}

function renderSpots(items, pos) {
  const el = document.getElementById('spotsScroll');
  if (!items.length) { el.innerHTML = '<div class="spots-empty">주변 장소 정보 없음</div>'; return; }
  el.innerHTML = items.map(p => {
    const name = p.tags.name || '이름 없음';
    const cat = p.tags.amenity || p.tags.leisure || p.tags.natural || '';
    const dist = p.lat ? Math.round(calcDist(pos.lat, pos.lng, p.lat, p.lon) * 1000) + 'm' : '';
    const url = `https://www.openstreetmap.org/?mlat=${p.lat}&mlon=${p.lon}&zoom=17`;
    return `<div class="spot-card" onclick="window.open('${url}','_blank')">
      <div class="spot-name">${name}</div>
      <div class="spot-cat">${cat}</div>
      <div class="spot-dist">${dist}</div>
    </div>`;
  }).join('');
}

// ── 유틸 ─────────────────────────────────────────────
function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371, d2r = Math.PI / 180;
  const dLat = (lat2-lat1)*d2r, dLng = (lng2-lng1)*d2r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*d2r)*Math.cos(lat2*d2r)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function lineColor(code) {
  return ({1:'#0052A4',2:'#009246',3:'#EF7C1C',4:'#00A5DE',5:'#996CAC',
           6:'#CD7C2F',7:'#747F00',8:'#E6186C',9:'#BDB092'})[code] || '#4B5563';
}

function setLocBadge(t) { document.getElementById('locationBadge').textContent = t; }

let _toastTimer;
function showToast(msg, isInfo=false, ms=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isInfo?' info':'') + ' show';
  clearTimeout(_toastTimer);
  if (ms < 90000) _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); clearTimeout(_toastTimer); }

let routeOpen = true;
function toggleRoute() {
  routeOpen = !routeOpen;
  document.getElementById('routeList').style.display = routeOpen ? '' : 'none';
  document.getElementById('routeToggleBtn').textContent = routeOpen ? '▼' : '▲';
}
</script>
</body>
</html>
